# For testing, you can set variables in your repo (Repo -> Settings ->
# Security -> Actions -> Variables) to restrict the tests that are run
# The supported variables are:
#
# RUN_ONLY_TARGET_CONFIG: Run only the single matching target and config,
#   separated by spaces, eg "ubuntu-latest default".  All other tests will
#   fail immediately.
#
# LTESTS: Override the set of tests run.

name: CI VM
on:
  push:
    paths: [ '**.c', '**.h', '**.m4', '**.sh', '**/Makefile.in', 'configure.ac', '.github/configs', '.github/workflows/vm.yml' ]
  pull_request:
    paths: [ '**.c', '**.h', '**.m4', '**.sh', '**/Makefile.in', 'configure.ac', '.github/configs', '.github/workflows/vm.yml' ]

jobs:
  dragonflybsd:
    name: "dragonflybsd-${{ matrix.target }}"
    if: github.repository != 'openssh/openssh-portable-selfhosted'
    strategy:
      fail-fast: false
      matrix:
        target:
          - "6.4.2"
        config: [default]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@main

    - name: start DragonFlyBSD ${{ matrix.target }} VM
      uses: vmactions/dragonflybsd-vm@v1
      with:
        release: ${{ matrix.target }}
        usesh: true
        prepare: |
          pkg install -y sudo git cmake ninja bash python3 autoconf automake
          pw useradd builder -m
          echo "builder ALL=(ALL:ALL) NOPASSWD: ALL" >>/usr/local/etc/sudoers
          mkdir -p /var/empty /usr/local/etc
          cp $GITHUB_WORKSPACE/moduli /usr/local/etc/moduli

    - name: set file perms
      shell: dragonflybsd {0}
      run: cd $GITHUB_WORKSPACE && chown -R builder .
    - name: Clone liboqs
      shell: dragonflybsd {0}
      run: cd $GITHUB_WORKSPACE && sudo -u builder bash ./oqs-scripts/clone_liboqs.sh
    - name: Build liboqs
      shell: dragonflybsd {0}
      run: cd $GITHUB_WORKSPACE && sudo -u builder bash ./oqs-scripts/build_liboqs.sh
    - name: Build OpenSSH
      shell: dragonflybsd {0}
      run: |
        cd $GITHUB_WORKSPACE
        chflags noschg /var/empty 2>/dev/null || true
        chmod 0755 /var/empty
        env GITHUB_ACTIONS=true WITH_OPENSSL=true bash ./oqs-scripts/build_openssh.sh
        chown -R builder oqs-test/tmp
    - name: Run tests documented to pass
      shell: dragonflybsd {0}
      run: cd $GITHUB_WORKSPACE && sudo -u builder bash ./oqs-test/run_tests.sh
    - name: Ensure we have the ssh and sshd syntax right once for each algorithm
      shell: dragonflybsd {0}
      run: cd $GITHUB_WORKSPACE && sudo -u builder python3 oqs-test/try_connection.py doone

  freebsd:
    name: "freebsd-${{ matrix.target }}"
    if: github.repository != 'openssh/openssh-portable-selfhosted'
    strategy:
      fail-fast: false
      matrix:
        target:
          - "13.5"
          - "14.3"
          # - "15.0" # "pkg" breaks with a libutil.so error...
        config: [default]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@main

    - name: start FreeBSD ${{ matrix.target }} VM
      uses: vmactions/freebsd-vm@v1
      with:
        release: ${{ matrix.target }}
        usesh: true
        prepare: |
          pkg install -y sudo git cmake ninja bash python3 autoconf automake
          pw useradd builder -m
          echo "builder ALL=(ALL:ALL) NOPASSWD: ALL" >>/usr/local/etc/sudoers
          mkdir -p /var/empty /usr/local/etc
          cp $GITHUB_WORKSPACE/moduli /usr/local/etc/moduli

    - name: set file perms
      shell: freebsd {0}
      run: cd $GITHUB_WORKSPACE && chown -R builder .
    - name: Clone liboqs
      shell: freebsd {0}
      run: cd $GITHUB_WORKSPACE && sudo -u builder bash ./oqs-scripts/clone_liboqs.sh
    - name: Build liboqs
      shell: freebsd {0}
      run: cd $GITHUB_WORKSPACE && sudo -u builder bash ./oqs-scripts/build_liboqs.sh
    - name: Build OpenSSH
      shell: freebsd {0}
      run: cd $GITHUB_WORKSPACE && sudo -u builder env GITHUB_ACTIONS=true WITH_OPENSSL=true bash ./oqs-scripts/build_openssh.sh
    - name: Run tests documented to pass
      shell: freebsd {0}
      run: cd $GITHUB_WORKSPACE && sudo -u builder bash ./oqs-test/run_tests.sh
    - name: Ensure we have the ssh and sshd syntax right once for each algorithm
      shell: freebsd {0}
      run: cd $GITHUB_WORKSPACE && sudo -u builder python3 oqs-test/try_connection.py doone


  netbsd:
    name: "netbsd-${{ matrix.target }}"
    if: github.repository != 'openssh/openssh-portable-selfhosted'
    strategy:
      fail-fast: false
      matrix:
        target:
          # NetBSD 9.x package repos are no longer reliable for CI dependency installs.
          - "10.0"
          - "10.1"
        config: [default]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@main

    - name: start NetBSD ${{ matrix.target }} VM
      uses: vmactions/netbsd-vm@v1
      with:
        release: ${{ matrix.target }}
        usesh: true
        prepare: |
          /usr/sbin/pkg_add -U sudo pcre2 bash git cmake ninja-build python311 autoconf automake
          /usr/sbin/useradd -m builder
          echo "builder ALL=(ALL:ALL) NOPASSWD: ALL" >>/usr/pkg/etc/sudoers
          mkdir -p /var/empty /usr/local/etc
          cp $GITHUB_WORKSPACE/moduli /usr/local/etc/moduli

    - name: set file perms
      shell: netbsd {0}
      run: cd $GITHUB_WORKSPACE && /sbin/chown -R builder .
    - name: Clone liboqs
      shell: netbsd {0}
      run: cd $GITHUB_WORKSPACE && sudo -u builder bash ./oqs-scripts/clone_liboqs.sh
    - name: Build liboqs
      shell: netbsd {0}
      run: cd $GITHUB_WORKSPACE && sudo -u builder bash ./oqs-scripts/build_liboqs.sh
    - name: Build OpenSSH
      shell: netbsd {0}
      run: cd $GITHUB_WORKSPACE && sudo -u builder env GITHUB_ACTIONS=true WITH_OPENSSL=true bash ./oqs-scripts/build_openssh.sh
    - name: Run tests documented to pass
      shell: netbsd {0}
      run: cd $GITHUB_WORKSPACE && sudo -u builder bash ./oqs-test/run_tests.sh
    - name: Ensure we have the ssh and sshd syntax right once for each algorithm
      shell: netbsd {0}
      run: cd $GITHUB_WORKSPACE && sudo -u builder /usr/pkg/bin/python3.9 oqs-test/try_connection.py doone


  omnios:
    name: "omnios-${{ matrix.target }}"
    if: github.repository != 'openssh/openssh-portable-selfhosted'
    strategy:
      fail-fast: false
      matrix:
        target:
          - "r151054"
          - "r151046"
        config: [default]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@main

    - name: start OmniOS ${{ matrix.target }} VM
      uses: vmactions/omnios-vm@v1
      with:
        release: ${{ matrix.target }}
        usesh: true
        prepare: |
          set -x
          pfexec pkg refresh
          pfexec pkg install build-essential git cmake ninja bash runtime/python-311 autoconf automake
          useradd -m builder
          sed -e "s/^root.*ALL$/root ALL=(ALL) NOPASSWD: ALL/" /etc/sudoers >>/tmp/sudoers
          mv /tmp/sudoers /etc/sudoers
          echo "builder ALL=(ALL) NOPASSWD: ALL" >>/etc/sudoers
          mkdir -p /var/empty /usr/local/etc
          cp $GITHUB_WORKSPACE/moduli /usr/local/etc/moduli

    - name: set file perms
      shell: omnios {0}
      run: cd $GITHUB_WORKSPACE && chown -R builder .
    - name: Clone liboqs
      shell: omnios {0}
      run: cd $GITHUB_WORKSPACE && sudo -u builder bash ./oqs-scripts/clone_liboqs.sh
    - name: Build liboqs
      shell: omnios {0}
      run: cd $GITHUB_WORKSPACE && sudo -u builder env LIBOQS_CMAKE_ARGS="-DOQS_PERMIT_UNSUPPORTED_ARCHITECTURE=ON" bash ./oqs-scripts/build_liboqs.sh
    - name: Build OpenSSH
      shell: omnios {0}
      run: cd $GITHUB_WORKSPACE && sed 's/make -j2/make -j 2/g' ./oqs-scripts/build_openssh.sh | sudo -u builder env GITHUB_ACTIONS=true WITH_OPENSSL=true bash
    - name: Run tests documented to pass
      shell: omnios {0}
      run: cd $GITHUB_WORKSPACE && sudo -u builder bash ./oqs-test/run_tests.sh
    - name: Ensure we have the ssh and sshd syntax right once for each algorithm
      shell: omnios {0}
      run: cd $GITHUB_WORKSPACE && sudo -u builder python3 oqs-test/try_connection.py doone


  openbsd:
    name: "openbsd-${{ matrix.target }}"
    if: github.repository != 'openssh/openssh-portable-selfhosted'
    strategy:
      fail-fast: false
      matrix:
        target:
          # OpenBSD older package repos are no longer reliable for CI dependency installs.
          - "7.7"
          - "7.8"
        config: [default]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@main

    - name: start OpenBSD ${{ matrix.target }} VM
      uses: vmactions/openbsd-vm@v1
      with:
        release: ${{ matrix.target }}
        usesh: true
        prepare: |
          pkg_add git cmake ninja bash python%3 openssl autoconf automake
          useradd -m builder
          echo "permit nopass keepenv root" >/etc/doas.conf
          echo "permit nopass keepenv builder" >>/etc/doas.conf
          ls -l /etc/doas.conf
          chown root:wheel /etc/doas.conf
          chmod 644 /etc/doas.conf
          mkdir -p /var/empty /usr/local/etc
          cp $GITHUB_WORKSPACE/moduli /usr/local/etc/moduli

    - name: set file perms
      shell: openbsd {0}
      run: cd $GITHUB_WORKSPACE && chown -R builder .
    - name: Clone liboqs
      shell: openbsd {0}
      run: cd $GITHUB_WORKSPACE && doas -u builder bash ./oqs-scripts/clone_liboqs.sh
    - name: Build liboqs
      shell: openbsd {0}
      run: |
        cd $GITHUB_WORKSPACE
        EOSSL_LIB=$(ls -d /usr/local/lib/eopenssl* 2>/dev/null | tail -1)
        if [ -n "$EOSSL_LIB" ] && [ -d "$EOSSL_LIB/cmake/OpenSSL" ]; then
          OQS_ARGS="-DOpenSSL_DIR=${EOSSL_LIB}/cmake/OpenSSL -DCMAKE_PREFIX_PATH=${EOSSL_LIB}"
        fi
        doas -u builder env LIBOQS_CMAKE_ARGS="$OQS_ARGS" bash ./oqs-scripts/build_liboqs.sh
    - name: Build OpenSSH
      shell: openbsd {0}
      run: cd $GITHUB_WORKSPACE && doas -u builder env GITHUB_ACTIONS=true WITH_OPENSSL=true bash ./oqs-scripts/build_openssh.sh
    - name: Run tests documented to pass
      shell: openbsd {0}
      run: cd $GITHUB_WORKSPACE && doas -u builder bash ./oqs-test/run_tests.sh
    - name: Ensure we have the ssh and sshd syntax right once for each algorithm
      shell: openbsd {0}
      run: cd $GITHUB_WORKSPACE && doas -u builder python3 oqs-test/try_connection.py doone


  openbsd-current-upstream:
    # This job runs the OQS workflow against OpenBSD -current.
    name: "openbsd-current-upstream"
    if: github.repository != 'openssh/openssh-portable-selfhosted'
    strategy:
      fail-fast: false
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@main

    - name: start OpenBSD VM
      uses: vmactions/openbsd-vm@v1
      with:
        copyback: false
        nat: |
          "20022": "22"
        usesh: true
        prepare: |
          pkg_add git cmake ninja bash python%3 openssl
          useradd -m builder
          echo "permit nopass keepenv root" >/etc/doas.conf
          echo "permit nopass keepenv builder" >>/etc/doas.conf
          ls -l /etc/doas.conf
          chown root:wheel /etc/doas.conf
          chmod 644 /etc/doas.conf
          mkdir -p /var/empty /usr/local/etc
          cp $GITHUB_WORKSPACE/moduli /usr/local/etc/moduli

    - name: Fetch sysupgrade version
      run: |
        ver=$(curl -s https://cdn.openbsd.org/pub/OpenBSD/snapshots/amd64/BUILDINFO)
        echo "SNAPSHOT_VERSION=${ver}" >> $GITHUB_ENV
    - name: check for cached sysupgrade
      id: cache-sysupgrade
      uses: actions/cache@v4
      with:
        key: openbsd-sysupgrade ${{ env.SNAPSHOT_VERSION }}
        path: /tmp/_sysupgrade/
    - name: push sysupgrade from cache to VM
      if: steps.cache-sysupgrade.outputs.cache-hit == 'true'
      run: rsync -av /tmp/_sysupgrade/ openbsd:/home/_sysupgrade/
    - name: upgrade to latest snapshot
      run: ssh -q openbsd sysupgrade -s -k || true
    - name: wait for upgrade
      run: |
        SECONDS=0; sleep 10; while ! ssh -q -oConnectTimeout=1 openbsd true; do sleep 10; echo waited ${SECONDS}s; done
        ssh -q openbsd uname -a
    - name: retrieve sysupgrade from VM to cache
      if: steps.cache-sysupgrade.outputs.cache-hit != 'true'
      run: |
        mkdir -p /tmp/_sysupgrade/
        rsync -av openbsd:/home/_sysupgrade/ /tmp/_sysupgrade/
    - name: save sysupgrade to cache
      if: steps.cache-sysupgrade.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        key: openbsd-sysupgrade ${{ env.SNAPSHOT_VERSION }}
        path: /tmp/_sysupgrade/

    - name: set file perms
      shell: openbsd {0}
      run: cd $GITHUB_WORKSPACE && chown -R builder .
    - name: Clone liboqs
      shell: openbsd {0}
      run: cd $GITHUB_WORKSPACE && doas -u builder bash ./oqs-scripts/clone_liboqs.sh
    - name: Build liboqs
      shell: openbsd {0}
      run: |
        cd $GITHUB_WORKSPACE
        EOSSL_LIB=$(ls -d /usr/local/lib/eopenssl* 2>/dev/null | tail -1)
        if [ -n "$EOSSL_LIB" ] && [ -d "$EOSSL_LIB/cmake/OpenSSL" ]; then
          OQS_ARGS="-DOpenSSL_DIR=${EOSSL_LIB}/cmake/OpenSSL -DCMAKE_PREFIX_PATH=${EOSSL_LIB}"
        fi
        doas -u builder env LIBOQS_CMAKE_ARGS="$OQS_ARGS" bash ./oqs-scripts/build_liboqs.sh
    - name: Build OpenSSH
      shell: openbsd {0}
      run: cd $GITHUB_WORKSPACE && doas -u builder env GITHUB_ACTIONS=true WITH_OPENSSL=true bash ./oqs-scripts/build_openssh.sh
    - name: Run tests documented to pass
      shell: openbsd {0}
      run: cd $GITHUB_WORKSPACE && doas -u builder bash ./oqs-test/run_tests.sh
    - name: Ensure we have the ssh and sshd syntax right once for each algorithm
      shell: openbsd {0}
      run: cd $GITHUB_WORKSPACE && doas -u builder python3 oqs-test/try_connection.py doone


  solaris:
    name: "solaris-${{ matrix.target }}"
    if: github.repository != 'openssh/openssh-portable-selfhosted'
    strategy:
      fail-fast: false
      matrix:
        target:
          - "11.4-gcc"
        config: [default]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@main

    - name: start Solaris ${{ matrix.target }} VM
      uses: vmactions/solaris-vm@v1
      with:
        release: ${{ matrix.target }}
        usesh: true
        prepare: |
          set -x
          pkg install --accept git cmake ninja bash runtime/python-39 autoconf automake || [ $? -eq 4 ]
          id -u builder >/dev/null 2>&1 || useradd -m builder
          sed -e "s/^root.*ALL$/root ALL=(ALL) NOPASSWD: ALL/" /etc/sudoers >>/tmp/sudoers
          mv /tmp/sudoers /etc/sudoers
          echo "builder ALL=(ALL) NOPASSWD: ALL" >>/etc/sudoers
          mkdir -p /var/empty /usr/local/etc
          cp $GITHUB_WORKSPACE/moduli /usr/local/etc/moduli

    - name: set file perms
      shell: solaris {0}
      run: cd $GITHUB_WORKSPACE && chown -R builder .
    - name: Clone liboqs
      shell: solaris {0}
      run: cd $GITHUB_WORKSPACE && sudo -u builder bash ./oqs-scripts/clone_liboqs.sh
    - name: Build liboqs
      shell: solaris {0}
      run: cd $GITHUB_WORKSPACE && sudo -u builder env LIBOQS_CMAKE_ARGS="-DOQS_PERMIT_UNSUPPORTED_ARCHITECTURE=ON" bash ./oqs-scripts/build_liboqs.sh
    - name: Build OpenSSH
      shell: solaris {0}
      run: cd $GITHUB_WORKSPACE && sed 's/make -j2/make -j 2/g' ./oqs-scripts/build_openssh.sh | sudo -u builder env GITHUB_ACTIONS=true WITH_OPENSSL=true bash
    - name: Run tests documented to pass
      shell: solaris {0}
      run: cd $GITHUB_WORKSPACE && sudo -u builder bash ./oqs-test/run_tests.sh
    - name: Ensure we have the ssh and sshd syntax right once for each algorithm
      shell: solaris {0}
      run: cd $GITHUB_WORKSPACE && sudo -u builder python3 oqs-test/try_connection.py doone
